name: Update Fleet Orbit

on:
  schedule:
    - cron: '42 4 * * *' # 04:42 UTC (approx 05:42/06:42 Oslo time)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      - uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15 # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Run update script
        run: ./update.sh
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@98357b18bf14b5342f975ff684046ec3b2a07725 # v8
        with:
          commit-message: "Update Fleet Orbit"
          title: "Update Fleet Orbit"
          body: "Automated update generated by `update.sh`."
          branch: "automation/update-fleet"
          labels: "dependencies"
