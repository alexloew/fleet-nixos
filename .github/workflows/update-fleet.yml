name: Update Fleet Orbit

on:
  schedule:
    - cron: '42 4 * * *' # 04:42 UTC (approx 05:42/06:42 Oslo time)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4
      - uses: cachix/install-nix-action@4e002c8ec80594ecd40e759629461e26c8abed15 # v31
        with:
          nix_path: nixpkgs=channel:nixos-unstable
      - name: Run update script
        run: ./update.sh
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@22a9089034f40e5a961c8808d113e2c98fb63676 # v7
        with:
          commit-message: "Update Fleet Orbit"
          title: "Update Fleet Orbit"
          body: "Automated update generated by `update.sh`."
          branch: "automation/update-fleet"
          labels: "dependencies"
