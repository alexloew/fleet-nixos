name: Update Fleet Orbit

on:
  schedule:
    - cron: "42 4 * * *" # 04:42 UTC (approx 05:42/06:42 Oslo time)
  workflow_dispatch:

jobs:
  update:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@8e8c483db84b4bee98b60c0593521ed34d9990e8 # v6
      - uses: DeterminateSystems/determinate-nix-action@1d699fc25db3f9e079cd2f168ca007a4183389be # v3.15.1
      - uses: DeterminateSystems/magic-nix-cache-action@565684385bcd71bad329742eefe8d12f2e765b39 # v13
      - name: Run update script
        run: ./update.sh
      - name: Create Pull Request
        uses: peter-evans/create-pull-request@98357b18bf14b5342f975ff684046ec3b2a07725 # v8
        with:
          commit-message: "Update Fleet Orbit"
          title: "Update Fleet Orbit"
          body: "Automated update generated by `update.sh`."
          branch: "automation/update-fleet"
          labels: "dependencies"
